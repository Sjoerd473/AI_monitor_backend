services:
  ai-monitor:

    build: .
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.4"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    expose:
      - "5000"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - aim_network

  nginx:
    image: nginx:alpine

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.1"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
      - /var/www/certbot:/var/www/certbot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      ai-monitor:
        condition: service_started
    networks:
      - aim_network

  db:
    image: postgres:16-alpine

    deploy:
      resources:
        limits:
          memory: 796M
          cpus: "0.4"

    # mem_limit: 1g
    # memswap_limit: 1g
    # shm_size: 256mb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d/
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - aim_network

  redis:
    image: redis:7-alpine

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.1"
    command:
      - redis-server
      - --appendonly
      - yes
      - --appendfsync
      - no
      - --maxmemory
      - 200mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - aim_network

volumes:
  pgdata:
  redisdata:


networks:
  aim_network:
    driver: bridge
