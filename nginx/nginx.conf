events {}

http {
    include       /etc/nginx/mime.types; # CRITICAL: Load the standard mime database
    default_type  application/octet-stream;
    
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name ai-monitor.madebyshu.net;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name ai-monitor.madebyshu.net;

        ssl_certificate /etc/letsencrypt/live/dev.madebyshu.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dev.madebyshu.net/privkey.pem;

        # FIX: Added include mime.types and explicit types for webp
        location ~* \.(jpg|jpeg|png|gif|webp|ico|svg)$ {
            include /etc/nginx/mime.types;
            # Manual override if your system mime.types is old/missing webp
            types {
                image/webp  webp;
            }

            proxy_pass http://ai-monitor:5000;
            proxy_set_header Host $host;
            proxy_pass_header Content-Type; # Ensure FastAPI's type passes through
            
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        location / {
            proxy_pass http://ai-monitor:5000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass_header Content-Type;
        }
    }
}