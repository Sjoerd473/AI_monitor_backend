<!DOCTYPE html>
<html lang="it" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Monitor Dashboard</title>
    <link href="{{ url_for('static', path='/dashboard_style.css') }}" rel="stylesheet">
</head>

<body>

    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <a href="#" class="theme-btn" title="Torna al sito principale">
                    <i data-lucide="arrow-left"></i>
                </a>
            </div>

            <div class="header-center">
                <h1>AI Monitor Dashboard</h1>
                <p>Monitoraggio consumi dei modelli AI</p>
            </div>

            <div class="header-right">
                <button id="theme-toggle" class="theme-btn" aria-label="Cambia Tema">
                </button>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="glass-card filter-section">
            <div class="filter-grid">
                <div class="filter-group">
                    <h3 class="filter-title">
                        <i data-lucide="activity" class="icon-blue"></i> Metrica Output
                    </h3>
                    <div class="btn-group" id="filter-output">
                        <button class="filter-btn active-output" data-val="acqua">Acqua</button>
                        <button class="filter-btn" data-val="co2">CO2</button>
                        <button class="filter-btn" data-val="energia">Energia</button>
                    </div>
                </div>

                <div class="filter-group">
                    <h3 class="filter-title">
                        <i data-lucide="clock" class="icon-green"></i> Orizzonte Temporale
                    </h3>
                    <div class="btn-group" id="filter-tempo">
                        <button class="filter-btn" data-val="ora">Ora</button>
                        <button class="filter-btn active-tempo" data-val="giorno">Giorno</button>
                        <button class="filter-btn" data-val="settimana">Settimana</button>
                    </div>
                </div>

                <div class="filter-group">
                    <h3 class="filter-title">
                        <i data-lucide="layers" class="icon-purple"></i> Tipo di Analisi
                    </h3>
                    <div class="btn-group" id="filter-tipo">
                        <button class="filter-btn active-tipo" data-val="prompt">Prompt</button>
                        <button class="filter-btn" data-val="modelli">Modelli</button>
                        <button class="filter-btn" data-val="categorie">Categorie</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="stats-grid">
            <div class="glass-card stat-card">
                <div class="stat-icon bg-blue">
                    <i data-lucide="droplet"></i>
                </div>
                <div class="stat-content">
                    <p class="stat-label">Consumo Totale</p>
                    <h4 class="stat-value" id="stat-total">0 L</h4>
                </div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-icon bg-green">
                    <i data-lucide="trending-down"></i>
                </div>
                <div class="stat-content">
                    <p class="stat-label">Variazione periodo prec.</p>
                    <h4 class="stat-value text-green" id="stat-trend">--%</h4>
                </div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-icon bg-purple">
                    <i data-lucide="euro"></i>
                </div>
                <div class="stat-content">
                    <p class="stat-label">Costo Totale</p>
                    <h4 class="stat-value" id="stat-cost">0 €</h4>
                </div>
            </div>
        </section>

        <section class="glass-card chart-section">
            <div class="chart-header">
                <h2 id="chart-title">Consumo Acqua per Modelli (Giorno)</h2>
                <button onclick="fetchAndRenderData()" class="refresh-btn">
                    <i data-lucide="refresh-cw"></i> Ricarica Dati
                </button>
            </div>

            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', path='/chart.min.js') }}"></script>
    <script src="{{ url_for('static', path='/lucide.min.js') }}"></script>

    <script src="/static/dashboard.js?t={{ reload_timestamp }}"></script>
</body>

</html>
