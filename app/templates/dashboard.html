<!DOCTYPE html>
<html lang="it" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Monitor Dashboard</title>




    <!-- Google Fonts -->
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"> -->
    <link href="{{ url_for('static', path='/dashboard_style.css') }}" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180"
        href="{{ url_for('static', path='/images/icons/apple-touch-icon.png' ) }}">
    <link rel="icon" type="image/png" sizes="32x32"
        href="{{ url_for('static', path='/images/icons/favicon-32x32.png' ) }}">
    <link rel="icon" type="image/png" sizes="16x16"
        href="{{ url_for('static', path='/images/icons/favicon-16x16.png' ) }}">
    <link rel="manifest" href="{{ url_for('static', path='/images/icons/site.webmanifest') }}">

</head>


<!-- Header con navigazione -->
<header>
    <div class="max-w-7xl mx-auto w-full flex justify-between items-center relative">

        <!-- Sezione Sinistra (Freccia Indietro) -->
        <div class="flex justify-start">
            <a href="https://ai-monitor.madebyshu.net/" target="_blank" rel="noopener noreferrer" class="theme-btn"
                title="Torna al sito principale">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
        </div>

        <!-- Sezione Centrale (Titoli perfettamente centrati) -->
        <div
            class="absolute left-1/2 transform -translate-x-1/2 flex flex-col items-center text-center w-full max-w-[60%] pointer-events-none">
            <h1 class="text-lg md:text-2xl font-bold text-main tracking-tight">AI Monitor Dashboard</h1>
            <p class="text-xs md:text-sm text-muted mt-0.5">Monitoraggio consumi dei modelli AI</p>
        </div>

        <!-- Sezione Destra (Cambio Tema) -->
        <div class="flex justify-end">
            <button id="theme-toggle" class="theme-btn" aria-label="Cambia Tema Giorno/Notte">
                <!-- Icona gestita da JS -->
            </button>
        </div>

    </div>
</header>

<main class="max-w-7xl mx-auto px-4 md:px-8 space-y-6">

    <!-- Sezione Filtri -->
    <div class="glass-card p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- Gruppo 1: Output -->
            <div>
                <h3 class="text-sm font-semibold text-main uppercase tracking-wider mb-3 flex items-center gap-2">
                    <i data-lucide="activity" class="w-4 h-4 text-blue-500"></i> Metrica Output
                </h3>
                <div class="flex flex-wrap gap-2" id="filter-output">
                    <button class="filter-btn active-output px-4 py-2 rounded-full text-sm font-medium"
                        data-val="acqua">Acqua</button>
                    <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium" data-val="co2">CO2</button>
                    <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium"
                        data-val="energia">Energia</button>
                </div>
            </div>

            <!-- Gruppo 2: Tempo (Rimossi Mese e Anno) -->
            <div>
                <h3 class="text-sm font-semibold text-main uppercase tracking-wider mb-3 flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4 text-green-500"></i> Orizzonte Temporale
                </h3>
                <div class="flex flex-wrap gap-2" id="filter-tempo">
                    <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium" data-val="ora">Ora</button>
                    <button class="filter-btn active-tempo px-4 py-2 rounded-full text-sm font-medium"
                        data-val="giorno">Giorno</button>
                    <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium"
                        data-val="settimana">Settimana</button>
                </div>
            </div>

            <!-- Gruppo 3: Tipo -->
            <div>
                <h3 class="text-sm font-semibold text-main uppercase tracking-wider mb-3 flex items-center gap-2">
                    <i data-lucide="layers" class="w-4 h-4 text-purple-500"></i> Tipo di Analisi
                </h3>
                <div class="flex flex-wrap gap-2" id="filter-tipo">
                    <button class="filter-btn active-tipo px-4 py-2 rounded-full text-sm font-medium"
                        data-val="prompt">Prompt</button>
                    <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium"
                        data-val="modelli">Modelli</button>
                    <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium"
                        data-val="categorie">Categorie</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Dashboard Statistiche Rapide -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="glass-card p-6 flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 transition-colors"
                id="stat-icon-1">
                <i data-lucide="droplet"></i>
            </div>
            <div>
                <p class="text-sm text-muted font-medium">Consumo Totale</p>
                <h4 class="text-2xl font-bold text-main" id="stat-total">0 L</h4>
            </div>
        </div>
        <div class="glass-card p-6 flex items-center gap-4">
            <div
                class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center text-green-600 transition-colors">
                <i data-lucide="trending-down"></i>
            </div>
            <div>
                <p class="text-sm text-muted font-medium">Variazione vs periodo prec.</p>
                <h4 class="text-2xl font-bold text-green-500" id="stat-trend">--%</h4>
            </div>
        </div>
        <div class="glass-card p-6 flex items-center gap-4">
            <div
                class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 transition-colors">
                <i data-lucide="euro"></i>
            </div>
            <div>
                <p class="text-sm text-muted font-medium">Costo Totale</p>
                <h4 class="text-2xl font-bold text-main" id="stat-cost">0 €</h4>
            </div>
        </div>
    </div>

    <!-- Sezione Grafico -->
    <div class="glass-card p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold text-main" id="chart-title">Consumo Acqua per Modelli (Giorno)</h2>
            <button onclick="fetchAndRenderData()"
                class="text-sm text-blue-500 hover:text-blue-600 flex items-center gap-1 font-medium transition-colors">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Ricarica Dati
            </button>
        </div>

        <!-- Sotto-filtri Categorie (Visibile solo se Tipo = Categorie) -->
        <div id="category-filters"
            class="hidden flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 pb-5 border-b"
            style="border-color: var(--border-color);">
            <h3 class="text-sm font-semibold text-main uppercase tracking-wider flex items-center gap-2">
                <i data-lucide="filter" class="w-4 h-4 text-gray-400"></i> Filtra per Categoria
            </h3>
            <div class="flex flex-wrap gap-2" id="category-toggle-container">
                <!-- Category buttons are generated dynamically from data -->
            </div>
        </div>

        <div class="relative h-[400px] w-full">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

</main>



<script src="{{ url_for('static', path='/chart.min.js') }}"></script>
<script src="{{ url_for('static', path='/lucide.min.js') }}"></script>
<script src="{{ url_for('static', path='/tailwind.js') }}"></script>
<script src="/static/dashboard.js?t={{ reload_timestamp }}"></script>
</body>

</html>
