<!DOCTYPE html>
<html lang="it" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Impact Monitor Dashboard</title>

    <link href="{{ url_for('static', path='/dashboard_style.css') }}" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180"
        href="{{ url_for('static', path='/images/icons/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32"
        href="{{ url_for('static', path='/images/icons/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16"
        href="{{ url_for('static', path='/images/icons/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', path='/images/icons/site.webmanifest') }}">
</head>

<body>

<!-- Header con navigazione -->
<header>
    <div class="header-inner">

        <!-- Sezione Sinistra (Freccia Indietro) -->
        <div class="header-left">
            <a href="/" class="theme-btn" title="Torna al sito principale">
                <i data-lucide="arrow-left" style="width:1.25rem;height:1.25rem;"></i>
            </a>
        </div>

        <!-- Sezione Centrale (Titoli perfettamente centrati) -->
        <div class="header-center">
            <h1>AI Impact Monitor Dashboard</h1>
            <p>Monitoraggio consumi dei modelli AI</p>
        </div>

        <!-- Sezione Destra (Cambio Tema) -->
        <div class="header-right">
            <button id="theme-toggle" class="theme-btn" aria-label="Cambia Tema Giorno/Notte">
                <!-- Icona gestita da JS -->
            </button>
        </div>

    </div>
</header>

<main>

    <!-- Sezione Filtri -->
    <div class="glass-card filters-card">
        <div class="filters-grid">

            <!-- Gruppo 1: Output -->
            <div>
                <h3 class="filter-group-title">
                    <i data-lucide="activity" class="icon-blue"></i> Metrica Output
                </h3>
                <div class="filter-buttons" id="filter-output">
                    <button class="filter-btn active-output" data-val="acqua">Acqua</button>
                    <button class="filter-btn" data-val="co2">CO2</button>
                    <button class="filter-btn" data-val="energia">Energia</button>
                </div>
            </div>

            <!-- Gruppo 2: Tempo -->
            <div>
                <h3 class="filter-group-title">
                    <i data-lucide="clock" class="icon-green"></i> Orizzonte Temporale
                </h3>
                <div class="filter-buttons" id="filter-tempo">
                    <button class="filter-btn" data-val="ora">Ora</button>
                    <button class="filter-btn active-tempo" data-val="giorno">Giorno</button>
                    <button class="filter-btn" data-val="settimana">Settimana</button>
                </div>
            </div>

            <!-- Gruppo 3: Tipo -->
            <div>
                <h3 class="filter-group-title">
                    <i data-lucide="layers" class="icon-purple"></i> Tipo di Analisi
                </h3>
                <div class="filter-buttons" id="filter-tipo">
                    <button class="filter-btn active-tipo" data-val="prompt">Prompt</button>
                    <button class="filter-btn" data-val="modelli">Modelli</button>
                    <button class="filter-btn" data-val="categorie">Categorie</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Dashboard Statistiche Rapide -->
    <div class="stats-grid">

        <div class="glass-card stat-card">
            <div class="stat-icon stat-icon--blue" id="stat-icon-1">
                <i data-lucide="droplet"></i>
            </div>
            <div>
                <p class="stat-label">Consumo Totale</p>
                <h4 class="stat-value" id="stat-total">0 L</h4>
            </div>
        </div>

        <div class="glass-card stat-card">
            <div class="stat-icon stat-icon--green" id="stat-icon-2">
                <i data-lucide="trending-down"></i>
            </div>
            <div>
                <p class="stat-label">Variazione vs periodo prec.</p>
                <h4 class="stat-value stat-value--green" id="stat-trend">--%</h4>
            </div>
        </div>

        <div class="glass-card stat-card">
            <div class="stat-icon stat-icon--purple">
                <i data-lucide="euro"></i>
            </div>
            <div>
                <p class="stat-label">Costo Totale</p>
                <h4 class="stat-value" id="stat-cost">0 €</h4>
            </div>
        </div>

    </div>

    <!-- Sezione Grafico -->
    <div class="glass-card chart-card">
        <div class="chart-header">
            <h2 id="chart-title">Consumo Acqua per Modelli (Giorno)</h2>
            <button class="reload-btn" onclick="fetchAndRenderData()">
                <i data-lucide="refresh-cw"></i> Ricarica Dati
            </button>
        </div>

        <!-- Sotto-filtri Categorie -->
        <div id="category-filters" class="category-filters">
            <h3 class="category-filters-title">
                <i data-lucide="filter"></i> Filtra per Categoria
            </h3>
            <div class="filter-buttons" id="category-toggle-container">
                <!-- Category buttons generated dynamically -->
            </div>
        </div>

        <div class="chart-canvas-wrapper">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

</main>

</body>
<script src="{{ url_for('static', path='/chart.min.js') }}"></script>
<script src="{{ url_for('static', path='/lucide.min.js') }}"></script>
<script src="/static/dashboard.js?t={{ reload_timestamp }}"></script>

</html>
